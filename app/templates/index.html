<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Contexto Ubicuo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h2 class="mb-4 text-center text-danger fw-bold">Software de Generación de Datos de Prueba</h2>

        <div class="row g-4">
            <div class="col-lg-5">
                <form id="simuladorForm">

                    <div class="card shadow-sm mb-4 border-start border-4 border-primary">
                        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="bi bi-geo-alt-fill text-primary me-2"></i>1. Ubicación de Origen
                            </h5>
                            <span class="badge bg-primary">OBLIGATORIO</span>
                        </div>
                        <div class="card-body">
                            <ul class="nav nav-pills nav-fill mb-3" role="tablist">
                                <li class="nav-item">
                                    <button class="nav-link active small fw-bold" data-bs-toggle="pill"
                                        data-bs-target="#panel-ciudad" type="button"
                                        onclick="simulador.gestionarInputsUbicacion('ciudad')">Ciudad</button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link small fw-bold" data-bs-toggle="pill"
                                        data-bs-target="#panel-coord" type="button"
                                        onclick="simulador.gestionarInputsUbicacion('coord')">Coordenadas</button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link small fw-bold" data-bs-toggle="pill"
                                        data-bs-target="#panel-cp" type="button"
                                        onclick="simulador.gestionarInputsUbicacion('cp')">C. Postal</button>
                                </li>
                            </ul>

                            <div class="tab-content border p-3 rounded bg-white">
                                <div class="tab-pane fade show active" id="panel-ciudad" role="tabpanel">
                                    <label class="form-label-custom">Ciudad Capital</label>
                                    <select class="form-select" name="ciudad" id="input-ciudad">
                                        <option value="" selected disabled>Seleccionar...</option>
                                        <option value="Santiago del Estero, AR">Santiago del Estero, AR</option>
                                        <option value="Córdoba, AR">Córdoba, AR</option>
                                    </select>
                                </div>
                                <div class="tab-pane fade" id="panel-coord" role="tabpanel">
                                    <div class="row g-2">
                                        <div class="col-6"><input type="text" class="form-control" id="input-lat"
                                                placeholder="Latitud" disabled></div>
                                        <div class="col-6"><input type="text" class="form-control" id="input-lng"
                                                placeholder="Longitud" disabled></div>
                                    </div>
                                </div>
                                <div class="tab-pane fade" id="panel-cp" role="tabpanel">
                                    <input type="text" class="form-control" id="input-cp"
                                        placeholder="Código Postal (ej: 4200, Argentina)" disabled>
                                </div>
                            </div>
                        </div>
                    </div>

                    <p class="text-muted small fw-bold">CONFIGURACIÓN OPCIONAL</p>
                    <p class="text-muted small fw-bold">PUEDE CONFIGURAR TODAS OPCIONES JUNTAS O SOLO LAS QUE DESEA</p>

                    <div class="card shadow-sm mb-3 border-start border-4 border-secondary opacity-75" id="card-pois">
                        <div class="card-header bg-white py-2">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="checkPois"
                                    onchange="simulador.toggleSection('pois')">
                                <label class="form-check-label fw-bold small">PUNTOS DE INTERÉS</label>
                            </div>
                        </div>
                        <div class="card-body section-content" id="content-pois">
                            <div class="row g-2">
                                <div class="col-6"><input type="number" class="form-control" id="radio"
                                        placeholder="Radio (m)" disabled></div>
                                <div class="col-6"><input type="number" class="form-control" id="cantPoints"
                                        placeholder="Cantidad" disabled></div>
                                <div class="col-12">
                                    <select class="form-select" id="categories" disabled>
                                        <option value="">Categoría...</option>
                                        <option value="university">Universidades</option>
                                        <option value="hospital">Hospitales</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-3 border-start border-4 border-secondary opacity-75" id="card-clima">
                        <div class="card-header bg-white py-2">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="checkClima"
                                    onchange="simulador.toggleSection('clima')">
                                <label class="form-check-label fw-bold small">AMBIENTE (CLIMA)</label>
                            </div>
                        </div>
                        <div class="card-body section-content" id="content-clima">
                            <label class="form-label-custom">Temperatura</label>
                            <div class="row g-2">
                                <div class="col-6"><input type="number" class="form-control" id="tempMin"
                                        placeholder="T. Min" disabled></div>
                                <div class="col-6"><input type="number" class="form-control" id="tempMax"
                                        placeholder="T. Max" disabled></div>
                            </div>
                            <label class="form-label-custom">Humedad</label>
                            <div class="row g-2">
                                <div class="col-6"><input type="number" class="form-control" id="humDes"
                                        placeholder="H. Des" disabled></div>
                                <div class="col-6"><input type="number" class="form-control" id="humFluc"
                                        placeholder="H. Fluc" disabled></div>
                            </div>
                            <!-- Multiple inputs -->
                            <div class="form-check">
                                <label class="form-check-label" for="check">Simular con temperatura y humedad
                                    ingresados</label>
                                <input type="checkbox" class="form-check-input" id="checkTempHum" name="checkTempHum"
                                    value="checkTempHum">
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-3 border-start border-4 border-secondary opacity-75" id="card-tiempo">
                        <div class="card-header bg-white py-2">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="checkTiempo"
                                    onchange="simulador.toggleSection('tiempo')">
                                <label class="form-check-label fw-bold small">TEMPORAL</label>
                            </div>
                        </div>
                        <div class="card-body section-content" id="content-tiempo">
                            <label class="form-label-custom">Hora del día</label>
                            <div class="row g-2">
                                <div class="col-6"><input type="text" class="form-control" id="hrMin"
                                        placeholder="Minima (HH:MM)" disabled></div>
                                <div class="col-6"><input type="text" class="form-control" id="hrMax"
                                        placeholder="Maxima (HH:MM)" disabled></div>
                            </div>
                            <label class="form-label-custom">Tiempo Libre</label>
                            <div class="row g-2">
                                <div class="col-6"><input type="text" id="prob1" name="prob1" class="form-control"
                                        placeholder="Menor a 15 min" disabled></div>
                                <div class="col-6"><input type="text" id="prob2" name="prob2" class="form-control"
                                        placeholder="Entre 15 y 30 min" disabled></div>
                            </div>
                            <div class="row g-2">
                                <div class="col-6"><input type="text" id="prob3" name="prob3" class="form-control"
                                        placeholder="Entre 30 y 50 min" disabled></div>
                                <div class="col-6"><input type="text" id="prob4" name="prob4" class="form-control"
                                        placeholder="1 hr o más" disabled></div>
                            </div>
                            <div class="form-check">
                                <label class="form-check-label" for="check">Simular tiempo libre con datos
                                    ingresados</label>
                                <input type="checkbox" class="form-check-input" id="checkTL" name="check"
                                    value="dataEntered" disabled>
                            </div>
                            <div class="input-group mb-3">
                                <span class="input-group-text">Mostrar</span>
                                <input type="number" id="cantTLibre" name="cantTLibre" class="form-control"
                                    placeholder="Cantidad" step="1" min="1" disabled>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 py-3 fw-bold mt-3">GENERAR ESCENARIO
                        SINTÉTICO</button>
                </form>
            </div>

            <div class="col-lg-7">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Resultados de Simulación</h5>
                        <button id="savebtn" class="btn btn-primary btn-sm fw-bold" disabled>
                            <i class="bi bi-download me-1"></i>Exportar JSON
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="ratio ratio-16x9 mb-3 border rounded">
                            <iframe id="mapaIframe" src="about:blank"></iframe>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-sm small">
                                <thead>
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Lat</th>
                                        <th>Lng</th>
                                        <th>¿En UNSE?</th>
                                    </tr>
                                </thead>
                                <tbody id="tbodyUbi"></tbody>
                            </table>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-sm small">
                                <thead>
                                    <tr>
                                        <th>Temperatura</th>
                                        <th>Humedad</th>
                                </thead>
                                <tbody id="tbodyAmb"></tbody>
                            </table>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-sm small">
                                <thead>
                                    <tr>
                                        <th>Hora del día</th>
                                    </tr>
                                </thead>
                                <tbody id="tbodyHora"></tbody>
                            </table>
                            <table class="table table-sm small">
                                <thead>
                                    <tr>
                                        <th>Tiempo libre</th>
                                    </tr>
                                </thead>
                                <tbody id="tbodyTLibre"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/index.js')}}" defer></script>
</body>

</html>
